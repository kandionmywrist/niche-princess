<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>niche princess</title>
  <link rel="icon" type="image/png" href="art.png">

  <!-- Open Graph / Link Preview -->
  <meta property="og:type" content="website">

  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="niche princess">
  <meta name="description" content="© 2026 Anarchist Sanctuary. All rights reserved.">

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="niche princess">
  <meta name="twitter:description" content="© 2026 Anarchist Sanctuary. All rights reserved.">
  <meta name="twitter:image" content="https://cdn.jsdelivr.net/gh/kandionmywrist/niche-princess@main/logo2.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: "MonteCarlo", cursive;
      color: #fff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3vh 4vw;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* SPARKLES CANVAS */
    #sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* everything above canvas */
    .logo, .cd-case, .player-group, .merch-btn, footer, a {
      position: relative;
      z-index: 1;
    }

    /* LOGO */
    .logo {
      width: clamp(77px, 16.5vw, 176px);
      flex-shrink: 0;
    }

    .logo img {
      width: 100%;
      display: block;
    }

    /* CD CASE */
    .cd-case {
      flex-shrink: 1;
      min-height: 0;
      width: clamp(200px, 88vw, 720px);
    }

    .cd-case img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      max-height: 58vh;
    }

    /* NOW PLAYING + PLAYER GROUP */
    .player-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    /* NOW PLAYING */
    .now-playing {
      font-size: clamp(16px, 3vw, 22px);
      color: #fff;
      letter-spacing: 0.3px;
      text-align: center;
    }

    /* AUDIO PLAYER */
    .player {
      width: clamp(200px, 88vw, 600px);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @media (max-width: 480px) {
      .volume-section {
        display: none;
      }
    }

    .play-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border: 2px solid #e00;
      border-radius: 50%;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-btn::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 13px solid #e00;
      margin-left: 3px;
    }

    .play-btn.paused::after {
      border: none;
      width: 13px;
      height: 14px;
      background: linear-gradient(to right, #e00 40%, transparent 40%, transparent 60%, #e00 60%);
      margin-left: 0;
    }

    /* TIMESTAMPS — normal font */
    .time {
      font-family: sans-serif;
      font-size: clamp(11px, 2vw, 14px);
      color: #e00;
      white-space: nowrap;
      min-width: 36px;
    }

    /* PROGRESS BAR */
    .progress-bar {
      flex: 1;
      height: 2px;
      background-color: #e00;
      position: relative;
      cursor: pointer;
    }

    .progress-bar .thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background-color: #e00;
      border-radius: 50%;
      transition: transform 0.1s;
    }

    .progress-bar:hover .thumb {
      transform: translate(-50%, -50%) scale(1.4);
    }

    /* VOLUME SECTION */
    .volume-section {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .volume-icon {
      width: 16px;
      height: 16px;
      fill: #e00;
      flex-shrink: 0;
      cursor: pointer;
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 70px;
      height: 2px;
      background: #e00;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e00;
      cursor: pointer;
    }

    .volume-slider::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e00;
      cursor: pointer;
      border: none;
    }

    /* LOADING OVERLAY */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-label {
      font-family: sans-serif;
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
    }

    #loading-bar-track {
      width: clamp(200px, 60vw, 500px);
      height: 2px;
      background: #222;
      position: relative;
    }

    #loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #e00;
      transition: width 0.3s ease;
    }

    #loading-pct {
      font-family: sans-serif;
      font-size: 12px;
      color: #e00;
    }

    /* BUY MERCH */
    .merch-btn {
      padding: clamp(8px, 1.5vh, 12px) clamp(20px, 5vw, 36px);
      background: none;
      border: 2px solid #e00;
      color: #fff;
      font-family: sans-serif;
      font-size: clamp(14px, 2.5vw, 18px);
      cursor: pointer;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .merch-btn:hover {
      background-color: #e00;
    }

    /* FOOTER */
    footer {
      font-family: sans-serif;
      font-size: clamp(10px, 1.6vw, 13px);
      color: #888;
      flex-shrink: 0;
      text-align: center;
    }

    /* ── 1. FADE-IN ON LOAD ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo        { opacity: 0; animation: fadeInUp 0.7s ease 0.1s forwards; }
    .cd-case     { opacity: 0; animation: fadeInUp 0.7s ease 0.25s forwards; }
    .player-group{ opacity: 0; animation: fadeInUp 0.7s ease 0.4s forwards; }
    .merch-btn   { opacity: 0; animation: fadeInUp 0.7s ease 0.55s forwards; }
    .lyrics-btn  { opacity: 0; animation: fadeInUp 0.7s ease 0.62s forwards; }
    footer       { opacity: 0; animation: fadeInUp 0.7s ease 0.7s forwards; }

/* ── 3. PROGRESS BAR GLOW ── */
    .progress-bar {
      box-shadow: 0 0 6px rgba(220, 0, 0, 0.5), 0 0 14px rgba(220, 0, 0, 0.2);
    }

    /* ── 4. NOW PLAYING FADE TRANSITION ── */
    .now-playing {
      transition: opacity 0.3s ease;
    }

    /* ── 5. BUTTON SHIMMER ── */
    .merch-btn, .lyrics-btn {
      overflow: hidden;
    }
    .merch-btn::before, .lyrics-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -120%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: skewX(-20deg);
    }
    .merch-btn:hover::before, .lyrics-btn:hover::before {
      left: 160%;
      transition: left 0.55s ease;
    }

    .lyrics-btn {
      padding: clamp(8px, 1.5vh, 12px) clamp(20px, 5vw, 36px);
      background: none;
      border: 2px solid #e00;
      color: #fff;
      font-family: sans-serif;
      font-size: clamp(14px, 2.5vw, 18px);
      cursor: pointer;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      position: relative;
    }
    .lyrics-btn:hover {
      background-color: #e00;
    }
  </style>
</head>
<body>

  <!-- SPARKLES -->
  <canvas id="sparkles"></canvas>

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png" alt="Niche Princess">
  </div>

  <!-- CD CASE -->
  <div class="cd-case">
    <img src="art.png" alt="Album Art">
  </div>

  <!-- NOW PLAYING + PLAYER -->
  <div class="player-group">
    <p class="now-playing"></p>
    <div class="player">
      <button class="play-btn" aria-label="Play"></button>
      <span class="time">0:00</span>
      <div class="progress-bar">
        <div class="thumb"></div>
      </div>
      <span class="time">--:--</span>
      <div class="volume-section">
        <!-- volume icon SVG -->
        <svg id="volume-icon" class="volume-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path id="volume-icon-path" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <input class="volume-slider" id="volume-slider" type="range" min="0" max="1" step="0.01" value="1">
      </div>
    </div>
  </div>

  <!-- BUTTONS -->
  <div style="display:flex; flex-direction:column; gap: clamp(8px,1.5vh,14px); align-items:center; justify-content:center;">
    <a href="https://wehate.life" target="_blank" rel="noopener noreferrer">
      <button class="merch-btn">shop niche princess t-shirt</button>
    </a>
    <a href="https://genius.com/albums/Asteria/Niche-princess" target="_blank" rel="noopener noreferrer">
      <button class="lyrics-btn">verified lyrics</button>
    </a>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>For any future inquiries: <a href="mailto:contact@nicheprincess.com" style="color:inherit; text-decoration:underline;">contact@nicheprincess.com</a></span><br>
    <span>© 2026 Anarchist Sanctuary. All rights reserved.</span>
  </footer>

  <!-- LOADING OVERLAY -->
  <div id="loading-overlay">
    <span id="loading-label">loading...</span>
    <div id="loading-bar-track">
      <div id="loading-bar-fill"></div>
    </div>
    <span id="loading-pct">0%</span>
  </div>

  <audio id="audio" preload="none"></audio>

  <script>
    // ─── TRACKLIST ────────────────────────────────────────────────
    const tracks = [
      { time: 0,    title: "dance for me" },
      { time: 197,  title: "bad bad bad" },
      { time: 233,  title: "bad bad bad (feat. lytra)" },
      { time: 304,  title: "make you sweat" },
      { time: 465,  title: "keep a secret" },
      { time: 627,  title: "obsessed with you" },
      { time: 733,  title: "whatever it takes" },
      { time: 894,  title: "withdrawals (2026 remaster)" },
      { time: 954,  title: "comfort zone" },
      { time: 1031, title: "i'm back on the drugs" },
      { time: 1198, title: "one more line?" },
      { time: 1346, title: "make us one last line" },
      { time: 1493, title: "this is the last line because i ran out" },
      { time: 1621, title: "my broken record" },
      { time: 1824, title: "i know ur getting sick of me" },
      { time: 1920, title: "i just hope you tell me when you change your mind" },
      { time: 2112, title: "running out of time" },
      { time: 2197, title: "sippin soju" },
      { time: 2328, title: "sippin soju (feat. hoso)" },
      { time: 2396, title: "advertisement" },
      { time: 2417, title: "how could i be so stupid - interlude" },
      { time: 2484, title: "life update: she changed her mind" },
      { time: 2627, title: "guess i'm just invisible to you" },
      { time: 2682, title: "guess i'm just invisible to you (feat. i wanna be a jack-o-lantern)" },
      { time: 2760, title: "the only one you love" },
      { time: 2800, title: "the only one you love - Full Version" },
      { time: 2902, title: "everyday is the same in nz" },
      { time: 2994, title: "sobbing at the strip club" },
      { time: 3174, title: "bleeding out" },
      { time: 3233, title: "one way ticket - interlude" },
      { time: 3343, title: "look who's back" },
      { time: 3421, title: "possessed" },
      { time: 3570, title: "hahaha happy halloween bro" },
      { time: 3645, title: "i'm not that stupid anymore" },
      { time: 3730, title: "i'll stay sober (tfw ur a drug addict - Original Version)" },
      { time: 3908, title: "all we need is us" },
      { time: 3962, title: "all we need is us (feat. kets4eki)" },
      { time: 4003, title: "hatefuck" },
      { time: 4120, title: "finale: guillotine" },
      { time: 4313, title: null }, // end of album
    ];
    // ─────────────────────────────────────────────────────────────

    const audio       = document.getElementById('audio');
    const nowPlaying  = document.querySelector('.now-playing');
    const playBtn     = document.querySelector('.play-btn');
    const thumb       = document.querySelector('.thumb');
    const progressBar = document.querySelector('.progress-bar');
    const timeEls     = document.querySelectorAll('.time');
    const overlay     = document.getElementById('loading-overlay');
    const barFill     = document.getElementById('loading-bar-fill');
    const loadingPct  = document.getElementById('loading-pct');
    const cdImg       = document.querySelector('.cd-case img');

    // ─── LOADING ──────────────────────────────────────────────────
    // Dismiss overlay immediately — audio loads on demand when play is pressed
    window.addEventListener('load', () => {
      setTimeout(() => overlay.classList.add('hidden'), 300);
    });

    // Buffer progress once audio is loading
    audio.addEventListener('progress', () => {
      if (!audio.duration || !audio.buffered.length) return;
      const pct = Math.min(100, (audio.buffered.end(audio.buffered.length - 1) / audio.duration) * 100);
      barFill.style.width = pct + '%';
      loadingPct.textContent = Math.floor(pct) + '%';
    });

    // ─── HELPERS ──────────────────────────────────────────────────
    function formatTime(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      return h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
        : `${m}:${String(sec).padStart(2,'0')}`;
    }

    function getActiveTrack(current) {
      let active = tracks[0];
      for (const track of tracks) {
        if (current >= track.time) active = track;
        else break;
      }
      return active;
    }

    let lastTitle = null;
    function updateNowPlaying(current) {
      if (!hasStarted) return;
      const active = getActiveTrack(current);
      const newTitle = active.title ? 'Now Playing: ' + active.title : '';
      if (active.title !== lastTitle) {
        lastTitle = active.title;
        // fade out → swap text → fade in
        nowPlaying.style.opacity = '0';
        setTimeout(() => {
          nowPlaying.textContent = newTitle;
          nowPlaying.style.opacity = '1';
        }, 300);
        updateMediaSession(active.title);
      }
    }

    let hasStarted = false;

    // ─── PLAY / PAUSE ─────────────────────────────────────────────
    let audioLoaded = false;

    playBtn.addEventListener('click', () => {
      if (!audioLoaded) {
        audioLoaded = true;
        audio.src = 'audio.mp3';
        audio.load();
        audio.addEventListener('canplay', () => audio.play(), { once: true });
        return;
      }
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    });

    const artworkURL = 'https://cdn.jsdelivr.net/gh/kandionmywrist/niche-princess@main/player.png';

    // Preload artwork so iOS has it cached before the lock screen requests it
    const _artworkPreload = new Image();
    _artworkPreload.src = artworkURL;

    function updateMediaSession(title) {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: title || 'niche princess',
          artist: 'niche princess',
          album: 'niche princess',
          artwork: [
            { src: artworkURL, sizes: '512x512', type: 'image/png' }
          ]
        });
      }
    }

    audio.addEventListener('play', () => {
      hasStarted = true;
      playBtn.classList.add('paused');
      updateMediaSession(getActiveTrack(audio.currentTime).title);
    });
    audio.addEventListener('pause', () => {
      playBtn.classList.remove('paused');
    });

    audio.addEventListener('ended', () => {
      playBtn.classList.remove('paused');
      nowPlaying.style.opacity = '0';
      setTimeout(() => { nowPlaying.textContent = ''; nowPlaying.style.opacity = '1'; }, 300);
      thumb.style.left = '0%';
      timeEls[0].textContent = '0:00';
    });

    // ─── PROGRESS BAR ─────────────────────────────────────────────
    audio.addEventListener('timeupdate', () => {
      if (isScrubbing) return;
      const current = audio.currentTime;
      const duration = audio.duration || 0;
      const pct = duration ? (current / duration) * 100 : 0;
      thumb.style.left = pct + '%';
      timeEls[0].textContent = formatTime(current);
      updateNowPlaying(current);
    });

    audio.addEventListener('loadedmetadata', () => {
      timeEls[1].textContent = formatTime(audio.duration);
    });

    // ─── SCRUBBING (drag support) ──────────────────────────────────
    let isScrubbing = false;
    let wasPlaying  = false;

    function getPct(e) {
      const rect = progressBar.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    }

    function startScrub(e) {
      if (!audio.duration) return;
      isScrubbing = true;
      wasPlaying = !audio.paused;
      if (wasPlaying) audio.pause();
      moveScrub(e);
    }

    function moveScrub(e) {
      if (!isScrubbing) return;
      e.preventDefault();
      const pct = getPct(e);
      thumb.style.left = (pct * 100) + '%';
      timeEls[0].textContent = formatTime(pct * audio.duration);
      updateNowPlaying(pct * audio.duration);
    }

    function endScrub(e) {
      if (!isScrubbing) return;
      isScrubbing = false;
      const pct = getPct(e.changedTouches ? { clientX: e.changedTouches[0].clientX } : e);
      audio.currentTime = pct * audio.duration;
      if (wasPlaying) audio.play();
    }

    progressBar.addEventListener('mousedown',  startScrub);
    progressBar.addEventListener('touchstart', startScrub, { passive: false });
    document.addEventListener('mousemove',     moveScrub);
    document.addEventListener('touchmove',     moveScrub, { passive: false });
    document.addEventListener('mouseup',       endScrub);
    document.addEventListener('touchend',      endScrub);

    // ─── VOLUME ───────────────────────────────────────────────────
    const volumeSlider  = document.getElementById('volume-slider');
    const volumeIcon    = document.getElementById('volume-icon');
    const volumeIconPath = document.getElementById('volume-icon-path');

    const ICON_UNMUTED = "M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z";
    const ICON_MUTED   = "M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z";

    let isMuted = false;
    let volumeBeforeMute = 1;

    volumeIcon.addEventListener('click', () => {
      isMuted = !isMuted;
      if (isMuted) {
        volumeBeforeMute = audio.volume;
        audio.volume = 0;
        volumeSlider.value = 0;
        volumeIconPath.setAttribute('d', ICON_MUTED);
      } else {
        audio.volume = volumeBeforeMute || 1;
        volumeSlider.value = audio.volume;
        volumeIconPath.setAttribute('d', ICON_UNMUTED);
      }
    });

    volumeSlider.addEventListener('input', () => {
      audio.volume = volumeSlider.value;
      // if user drags slider while muted, unmute
      if (isMuted && volumeSlider.value > 0) {
        isMuted = false;
        volumeIconPath.setAttribute('d', ICON_UNMUTED);
      }
      if (+volumeSlider.value === 0) {
        isMuted = true;
        volumeIconPath.setAttribute('d', ICON_MUTED);
      }
    });

    // ─── SPARKLES ─────────────────────────────────────────────────
    const canvas = document.getElementById('sparkles');
    const ctx    = canvas.getContext('2d');
    let sparkles = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    function spawnSparkle() {
      sparkles.push({
        x:     randomBetween(0, canvas.width),
        y:     randomBetween(canvas.height * 0.1, canvas.height),
        size:  randomBetween(1.5, 3.5),
        alpha: randomBetween(0.3, 0.7),
        vy:    randomBetween(-0.4, -1.0),
        vx:    randomBetween(-0.3, 0.3),
        life:  0,
        maxLife: randomBetween(80, 180),
      });
    }

    let frame = 0;
    function animateSparkles() {
      requestAnimationFrame(animateSparkles);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      frame++;
      if (frame % 6 === 0) spawnSparkle();

      sparkles = sparkles.filter(s => s.life < s.maxLife);

      for (const s of sparkles) {
        s.life++;
        s.x += s.vx;
        s.y += s.vy;
        const progress = s.life / s.maxLife;
        const a = s.alpha * Math.sin(Math.PI * progress); // fade in + out

        // draw a small 4-point star
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.globalAlpha = a;
        ctx.fillStyle = '#cc0000';
        ctx.beginPath();
        const r = s.size;
        for (let i = 0; i < 8; i++) {
          const angle = (i * Math.PI) / 4;
          const radius = i % 2 === 0 ? r : r * 0.4;
          if (i === 0) ctx.moveTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
          else ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    animateSparkles();
  </script>

</body>
</html>
